.pan-search-tabs{display:flex;gap:8px;overflow:auto;margin:0 0 12px;scrollbar-width:none}.pan-search-tabs::-webkit-scrollbar{display:none}.pan-search-tab{flex:0 0 auto;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:#191e29;color:#8e95a5;padding:8px 14px;font-size:14px;font-weight:950}.pan-search-tab.active{background:#ff6238;color:#fff;border-color:#ff8a5c}.pan-item{grid-template-columns:10px auto 1fr auto}.pan-health-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.22);box-shadow:none}.pan-health-dot[data-state="ok"]{background:#42e88a;box-shadow:0 0 14px rgba(66,232,138,.35)}.pan-health-dot[data-state="bad"]{background:#ff4d4f}.pan-health-dot[data-state="locked"]{background:#ffb020}.pan-health-dot[data-state="uncertain"]{background:rgba(255,255,255,.35)}.pan-health-dot[data-state="unsupported"]{visibility:hidden}.pan-actions{display:flex;gap:8px}.copy-btn,.pan-open-btn{height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.1);padding:0 14px;font-size:14px;font-weight:950;color:#fff}.copy-btn{background:#20242e;color:#d0d4dd}.pan-open-btn{background:#ff6238;border-color:#ff7b52}.pan-cfg-btn{border:0;background:transparent;color:#9aa2b1;font-size:16px;font-weight:900;padding:0 6px}.custom-modal-mask{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.58);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:22px}.custom-modal-mask.show{display:flex}.custom-modal{width:100%;max-width:380px;background:#141821;border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.custom-modal-title{font-size:18px;font-weight:950;margin-bottom:12px}.custom-modal-input{width:100%;height:46px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:#191e29;color:#fff;padding:0 12px;outline:0}.pan-type-cfg-label{display:flex;align-items:center;justify-content:space-between;color:#8e95a5;font-size:13px;font-weight:900;margin:14px 0 10px}.pan-type-all{border:0;border-radius:999px;background:#243455;color:#b7d2ff;padding:5px 12px;font-weight:900}.pan-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.pan-type-chip{height:40px;border-radius:13px;border:1px solid rgba(255,255,255,.12);background:#191e29;color:#8e95a5;font-weight:900}.pan-type-chip.on{background:#233a65;color:#fff;border-color:#3c7bff}.custom-modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}.custom-modal-btn{border:0;border-radius:13px;background:#20242e;color:#fff;padding:10px 18px;font-weight:900}.custom-modal-btn.accent{background:#ff6238}.pan-search-status{padding:28px 14px;text-align:center;color:#8e95a5;background:#141821;border:1px dashed rgba(255,255,255,.12);border-radius:18px}</style>

<body>

<script>
(function(){
'use strict';
if(window.fongmiBridge||window.fm)document.documentElement.classList.add('fm-native');
const TMDB_KEY='d7040155454e7fdf547c4d889ebbcca7',IMG='https://images.tmdb.org/t/p/w500';
const PAN_CONFIG={apiBase:localStorage.getItem('global_pan_api')||'https://so.252035.xyz',diskTypes:JSON.parse(localStorage.getItem('global_pan_types')||'null')||['quark','aliyun','baidu','uc','tianyi','xunlei','123','115','mobile','guangya','magnet','ed2k']};
const PAN_ALL_TYPES=['quark','aliyun','baidu','uc','tianyi','xunlei','123','115','mobile','guangya','magnet','ed2k'];
const PAN_TYPE_LABEL={quark:'夸克',aliyun:'阿里',baidu:'百度',uc:'UC',tianyi:'天翼',xunlei:'迅雷',123:'123',115:'115',mobile:'移动',guangya:'光鸭',magnet:'磁力',ed2k:'电驴'};
const PAN_CHECK_TYPES=new Set(['aliyun','quark','uc','baidu','tianyi','123','xunlei','115','mobile']);
const PAN_TYPE_ORDER=['quark','baidu','123','uc','115','aliyun','tianyi','xunlei'];
const PAN_QUALITY_KEYWORDS=['4k','8k','2160p','1080p','hdr','hdr10','hdr10+','dolby vision','dovi','杜比视界','杜比全景声','atmos','dolby atmos','杜比','remux','bluray','blu-ray','blueray','蓝光原盘','原盘','uhd','webdl','web-dl','bdrip','x265','h265','hevc','x264','h264','60帧','60fps','高码率','无水印','国语','粤语','国粤','中字','双语'];
const PLATFORMS=[['iqiyi','爱奇艺','1330'],['mgtv','芒果TV','1631'],['youku','优酷','1419'],['tencent','腾讯视频','2007'],['bilibili','哔哩哔哩','1605'],['netflix','Netflix','213'],['hbo','HBO Max','49'],['disney','Disney+','2739'],['appletv','Apple TV+','2552'],['amazon','Amazon Prime','1024'],['hulu','Hulu','453'],['paramount','Paramount+','4330']];
const MODES=[['next_episode','追更模式'],['daily_airing','今日播出'],['first_air_date.desc','最新上线'],['popularity.desc','综合热度']];
const AIRS=[['daily_airing','今日播出'],['next_episode','后续更新'],['first_air_date.desc','最近上线']];
const TYPES=[['anime','动漫'],['tv','剧集'],['movie','电影'],['variety','综艺']];
let state={mode:'next_episode',air:'daily_airing',type:'anime',nav:'ai',page:'ai',cache:{},last:[],fav:loadFav()};
const $=s=>document.querySelector(s),sheet=$('#sheet'),panel=$('#panel');
function esc(s){return String(s||'').replace(/[&<>'\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','\"':'"'}[c]))}
function clean(s){return String(s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}
function today(){let d=new Date(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return d.getFullYear()+'-'+m+'-'+day}
async function req(url,opt){if(window.fm&&fm.req){let r=await fm.req(url,{method:opt&&opt.method||'GET',headers:Object.assign({'User-Agent':'Mozilla/5.0'},opt&&opt.headers||{}),body:opt&&opt.body,responseType:'text',timeout:opt&&opt.timeout||25});if(!r.ok)throw new Error(r.error||('HTTP '+r.status));return r.body||''}let r=await fetch(url,{method:opt&&opt.method||'GET',headers:opt&&opt.headers,body:opt&&opt.body});return await r.text()}
async function json(url,opt){return JSON.parse(await req(url,opt)||'{}')}
async function tmdb(ep,p){let q=Object.assign({api_key:TMDB_KEY,language:'zh-CN'},p||{}),u='https://api.tmdb.org/3'+ep+'?'+new URLSearchParams(q);return await json(u)}
function chipBox(id,arr,key){let box=$(id);box.innerHTML=arr.map(x=>`<button class="chip ${state[key]===x[0]?'active':''}" data-v="${x[0]}">${x[1]}</button>`).join('');box.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{state[key]=b.dataset.v;chipBox(id,arr,key)})}
function initChips(){chipBox('#modeChips',MODES,'mode');chipBox('#airChips',AIRS,'air');chipBox('#typeChips',TYPES,'type')}
function poster(v){return v.poster_path?IMG+v.poster_path:''}
async function enrich(item,type,sort){let key=type+'_'+item.id+'_'+sort;if(state.cache[key])return state.cache[key];let detail={};try{detail=await tmdb('/'+(type==='movie'?'movie':'tv')+'/'+item.id,{append_to_response:'alternative_titles,external_ids'})}catch(e){}let title=item.name||item.title||'',hasCn=/[\u4e00-\u9fa5]/.test(title);if(!hasCn&&detail.alternative_titles){let arr=detail.alternative_titles.titles||detail.alternative_titles.results||[],cn=arr.find(x=>x.iso_3166_1==='CN'||x.iso_3166_1==='TW'||x.iso_3166_1==='HK');if(cn&&cn.title)title=cn.title}let remark='⭐'+((item.vote_average||0).toFixed?item.vote_average.toFixed(1):(item.vote_average||'0.0'));let date=item.first_air_date||item.release_date||'';let ep=detail.next_episode_to_air||detail.last_episode_to_air;if(type!=='movie'&&ep&&(sort==='next_episode'||sort==='daily_airing'||sort==='first_air_date.desc')){date=ep.air_date||date;remark=(detail.next_episode_to_air?'🕒':'✅')+' 上线 '+(date||'').slice(5)+' S'+String(ep.season_number||0).padStart(2,'0')+'E'+String(ep.episode_number||0).padStart(2,'0')}else if(date){remark+=' | '+date.slice(0,4)}let v={id:item.id,name:title,pic:poster(item),remark,meta:[typeName(type),date||'',remark].filter(Boolean).join(' · '),desc:detail.overview||item.overview||'',score:item.vote_average||0,type,raw:item,detail};state.cache[key]=v;return v}
function typeName(t){return {tv:'剧集',movie:'电影',anime:'动漫',variety:'综艺'}[t]||t}
async function discover(platform,sort,type,page){let endpoint=type==='movie'?'/discover/movie':'/discover/tv';let p={with_networks:platform[2],page:page||1,sort_by:(sort==='daily_airing'||sort==='next_episode')?'popularity.desc':sort};if(type==='anime')p.with_genres='16';if(type==='variety')p.with_genres='10764|10767';if(sort==='daily_airing'){p['air_date.gte']=today();p['air_date.lte']=today()}let r=await tmdb(endpoint,p);let arr=r.results||[],out=[];for(let i=0;i<Math.min(arr.length,12);i++)out.push(await enrich(arr[i],type,sort));return out}
function recHtml(v,i){return`<div class="rec-card" data-i="${i}"><div class="rec-pic">${v.pic?`<img src="${esc(v.pic)}">`:''}</div><div><div class="rec-name">${esc(v.name)}</div><div class="rec-meta">${esc(v.meta)}</div><div class="rec-reason">贴合你想要的「${esc(typeName(state.type))}」，${esc(v.remark)}。</div></div></div>`}
async function recommend(){let box=$('#recList');box.innerHTML='<div class="empty">正在推荐…</div>';try{let plats=shuffle(PLATFORMS).slice(0,4),all=[];for(let p of plats){let r=await discover(p,state.mode,state.type,1).catch(()=>[]);all=all.concat(r.slice(0,2))}state.last=shuffle(all).slice(0,8);box.innerHTML=state.last.length?state.last.map(recHtml).join(''):'<div class="empty">暂无推荐</div>';box.querySelectorAll('.rec-card').forEach(c=>c.onclick=()=>openDetail(state.last[parseInt(c.dataset.i)]))}catch(e){box.innerHTML='<div class="empty">推荐失败：'+esc(e.message)+'</div>'}}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1])}
function cardHtml(v,i){return`<div class="poster-card" data-i="${i}"><div class="poster">${v.pic?`<img src="${esc(v.pic)}">`:'<div class="noimg">影</div>'}</div><div class="pname">${esc(v.name)}</div><div class="premark">${esc(v.remark)}</div></div>`}
async function calendar(){let root=$('#calendarList');root.innerHTML='<div class="empty">加载追更日历…</div>';let html='';try{for(let p of PLATFORMS.slice(0,9)){let list=await discover(p,state.air,state.type,1).catch(()=>[]);if(!list.length)continue;let base=state.last.length;state.last=state.last.concat(list);html+=`<div class="platform-block"><h2 class="platform-title">${p[1]}</h2><div class="rail">${list.map((v,i)=>cardHtml(v,base+i)).join('')}</div></div>`}root.innerHTML=html||'<div class="empty">暂无日历数据</div>';root.querySelectorAll('.poster-card').forEach(c=>c.onclick=()=>openDetail(state.last[parseInt(c.dataset.i)]))}catch(e){root.innerHTML='<div class="empty">日历失败：'+esc(e.message)+'</div>'}}
async function openDetail(v){sheet.classList.add('active');panel.innerHTML='<div class="empty">加载详情…</div>';let isFav=state.fav.some(x=>x.id===v.id&&x.type===v.type);panel.innerHTML=`<button class="act" id="closeBtn">返回</button><div class="detail-head"><img class="detail-pic" src="${esc(v.pic)}" onerror="this.style.display='none'"><div><div class="detail-title">${esc(v.name)}</div><div class="detail-meta">${esc(v.meta)}<br>${esc(v.remark)}</div><div class="actions"><button class="act primary" id="panBtn">盘搜资源</button><button class="act" id="favBtn">${isFav?'已入库':'加入入库'}</button><button class="act" id="fmBtn">FongMi搜索</button><button class="act" id="closeBtn2">关闭</button></div></div></div><div class="pill">简介</div><div class="desc">${esc(v.desc||'暂无简介')}</div><div class="pill">盘搜结果</div><div id="panBox"><div class="empty">点击盘搜资源</div></div>`;$('#closeBtn').onclick=$('#closeBtn2').onclick=()=>sheet.classList.remove('active');$('#favBtn').onclick=()=>toggleFav(v);$('#fmBtn').onclick=()=>fmSearch(v.name);$('#panBtn').onclick=()=>panSearch(v.name)}
function loadFav(){try{return JSON.parse(localStorage.getItem('global_update_fav')||'[]')}catch(e){return[]}}
function saveFav(){localStorage.setItem('global_update_fav',JSON.stringify(state.fav))}
function toggleFav(v){let i=state.fav.findIndex(x=>x.id===v.id&&x.type===v.type);if(i>=0)state.fav.splice(i,1);else state.fav.unshift(v);saveFav();openDetail(v)}
function fmSearch(q){location.href='intent:#Intent;component=com.fongmi.android.tv/com.fongmi.android.tv.ui.activity.SearchActivity;S.keyword='+encodeURIComponent(q)+';end'}
function panTypeLabel(t){return PAN_TYPE_LABEL[t]||t||'网盘'}
function panApi(path){return PAN_CONFIG.apiBase.replace(/\/+$/,'')+path}
function panKeyword(t){return clean(String(t||'').replace(/[《》\[\]【】]/g,'').replace(/[(（].*?[)）]/g,''))}
function panNormUrl(u){return String(u||'').trim().replace(/[?&]+$/,'')}
function panQualityScore(title){let s=0,t=String(title||'').toLowerCase();PAN_QUALITY_KEYWORDS.forEach(k=>{if(t.indexOf(k.toLowerCase())!==-1)s++});return s}
function panTypeRank(t){let i=PAN_TYPE_ORDER.indexOf(t);if(i>=0)return i;let j=PAN_ALL_TYPES.indexOf(t);return 100+(j<0?99:j)}
function panTypesPresent(list){let m=new Map();list.forEach(x=>m.set(x.type,(m.get(x.type)||0)+1));return[...m.entries()].sort((a,b)=>panTypeRank(a[0])-panTypeRank(b[0]))}
async function panReq(path,body){let url=panApi(path);return await json(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),timeout:25})}
async function panSearchData(kw){let data=await panReq('/api/search',{kw,res:'merge',src:'all',cloud_types:PAN_CONFIG.diskTypes});let by=(data&&data.data&&data.data.merged_by_type)||(data&&data.merged_by_type)||{},out=[];Object.keys(by).forEach(type=>{if(PAN_CONFIG.diskTypes.indexOf(type)===-1)return;(by[type]||[]).forEach(it=>{let url=it.url||it.share_url||'';if(!url)return;out.push({type,title:clean(it.note||it.title||it.name||kw),url,password:it.password||it.pwd||'',datetime:it.datetime||it.time||''})})});let seen=new Set(),dedup=[];out.forEach(x=>{let k=x.type+'|'+panNormUrl(x.url);if(!seen.has(k)){seen.add(k);dedup.push(x)}});dedup.forEach((x,i)=>{x._q=panQualityScore(x.title);x._i=i});dedup.sort((a,b)=>b._q-a._q||a._i-b._i);return dedup}
async function panSearch(q){let box=$('#panBox');box.innerHTML='<div class="pan-search-status">正在聚合搜索网盘…</div>';let kw=panKeyword(q);try{let list=await panSearchData(kw);renderPanSearchBox(box,list,'')}catch(e){box.innerHTML='<div class="pan-search-status">盘搜失败：'+esc(e.message)+'</div>'}}
function renderPanSearchBox(box,all,active){if(!all.length){box.innerHTML='<div class="pan-search-status">未搜索到网盘资源</div>';return}let types=panTypesPresent(all);if(!active||!types.some(x=>x[0]===active))active=types[0][0];let tabs=types.map(([t,n])=>`<button class="pan-search-tab ${t===active?'active':''}" data-type="${esc(t)}" data-label="${esc(panTypeLabel(t))}">${esc(panTypeLabel(t))} ${n}</button>`).join('');let list=all.filter(x=>x.type===active);box.innerHTML=`<div class="pan-search-tabs">${tabs}</div><div class="pan-list">${list.map(p=>`<div class="pan-item"><span class="pan-health-dot" data-state="${PAN_CHECK_TYPES.has(p.type)?'idle':'unsupported'}"></span><span class="pan-type">${esc(panTypeLabel(p.type))}</span><div><div class="pan-name">${esc(p.title)}</div><div class="pan-meta">${esc(p.url)}${p.password?' · 提取码 '+esc(p.password):''}</div></div><div class="pan-actions"><button class="copy-btn" data-link="${esc(p.url)}">复制</button><button class="pan-open-btn" data-type="${esc(p.type)}" data-url="${esc(p.url)}" data-pwd="${esc(p.password)}" data-title="${esc(p.title)}">打开</button></div></div>`).join('')}</div>`;box.querySelectorAll('.pan-search-tab').forEach(b=>b.onclick=()=>renderPanSearchBox(box,all,b.dataset.type));box.querySelectorAll('.copy-btn').forEach(b=>b.onclick=()=>copyText(b.dataset.link));box.querySelectorAll('.pan-open-btn').forEach(b=>b.onclick=()=>playPanSearch({type:b.dataset.type,url:b.dataset.url,password:b.dataset.pwd,title:b.dataset.title}));panHealthCheck(box,list)}
function applyPanHealthFilter(box){let shown=0;box.querySelectorAll('.pan-item').forEach(it=>{let st=(it.querySelector('.pan-health-dot')||{}).dataset&&it.querySelector('.pan-health-dot').dataset.state||'';let hide=st==='bad'||st==='locked'||st==='uncertain';it.style.display=hide?'none':'';if(!hide)shown++});let at=box.querySelector('.pan-search-tab.active');if(at&&at.dataset.label)at.textContent=at.dataset.label+' '+shown}
async function panHealthCheck(box,list){if(!window.fm||!fm.pan||!fm.pan.check)return;let cfg;try{cfg=await fm.config()}catch(e){return}if(!cfg||!cfg.driveCheck)return;let checkable=list.map((p,i)=>({p,i})).filter(o=>PAN_CHECK_TYPES.has(o.p.type));let dots=box.querySelectorAll('.pan-health-dot');for(let s=0;s<checkable.length;s+=10){let batch=checkable.slice(s,s+10);try{let res=await fm.pan.check(batch.map(o=>({type:o.p.type,url:o.p.url,password:o.p.password||''})));(res.results||[]).forEach((r,k)=>{let dot=dots[batch[k].i];if(dot)dot.dataset.state=r.state||'uncertain'})}catch(e){}applyPanHealthFilter(box)}}
async function playPanSearch(p){if(window.fm&&fm.pan&&fm.pan.play){try{await fm.pan.play({type:p.type,url:p.url,password:p.password||'',title:p.title||''});return}catch(e){}}if(window.fm&&fm.play){await fm.play(p.url.startsWith('magnet:')?p.url:'push://'+p.url,p.title||'');return}location.href=p.url}
function copyText(t){if(navigator.clipboard)navigator.clipboard.writeText(t);else prompt('复制链接',t)}
function showFav(){state.last=state.fav;$('#pageAi').classList.add('active');$('#pageCal').classList.remove('active');$('#recList').innerHTML=state.fav.length?state.fav.map(recHtml).join(''):'<div class="empty">暂无入库</div>';$('#recList').querySelectorAll('.rec-card').forEach(c=>c.onclick=()=>openDetail(state.last[parseInt(c.dataset.i)]))}
async function doSearch(){let q=$('#searchInput').value.trim();if(!q)return;$('#recList').innerHTML='<div class="empty">搜索中…</div>';$('#pageAi').classList.add('active');$('#pageCal').classList.remove('active');await panSearchInPage(q)}
async function searchTmdbOne(q){try{let r=await tmdb('/search/multi',{query:q,page:1,include_adult:false});let it=(r.results||[]).find(x=>(x.media_type==='tv'||x.media_type==='movie')&&(x.poster_path||x.overview))||(r.results||[])[0];if(!it)return null;let type=it.media_type==='movie'?'movie':'tv';return await enrich(it,type,'popularity.desc')}catch(e){return null}}
async function panSearchInPage(q){let v=await searchTmdbOne(q)||{name:q,pic:'',meta:'搜索',remark:'盘搜结果',desc:'搜索：'+q,id:'search_'+q,type:'search'};openDetail(v);setTimeout(()=>panSearch(q),80)}
$('#topSeg').querySelectorAll('.seg').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;$('#topSeg').querySelectorAll('.seg').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#pageAi').classList.toggle('active',state.page==='ai');$('#pageCal').classList.toggle('active',state.page==='cal');$('#searchBar').classList.remove('active');if(state.page==='cal'){state.last=[];calendar()}});
$('.bottom').querySelectorAll('.nav').forEach(b=>b.onclick=()=>{$('.bottom').querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));b.classList.add('active');let n=b.dataset.nav;if(n==='search'){$('#searchBar').classList.toggle('active');return}$('#searchBar').classList.remove('active');if(n==='fav'){showFav();return}if(n==='home'||n==='ai'){state.page='ai';$('#pageAi').classList.add('active');$('#pageCal').classList.remove('active');$('#topSeg').querySelectorAll('.seg').forEach(x=>x.classList.toggle('active',x.dataset.page==='ai'))}});
$('#recommendBtn').onclick=recommend;$('#refreshBtn').onclick=recommend;$('#searchDo').onclick=doSearch;$('#searchInput').onkeydown=e=>{if(e.key==='Enter')doSearch()};
initChips();recommend();
})();
</script>
</body>
